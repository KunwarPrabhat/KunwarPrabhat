name: Readme Profile Generation

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Generate Native Profile SVG
        run: node .github/scripts/generate-assets.js
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/assets/profile.svg
          git commit -m "chore: dynamically generated pure native SVG profile [skip ci]" || echo "No changes to commit"
          git push
