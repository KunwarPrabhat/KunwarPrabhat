name: Generate README

on:
  push:
    branches: [main]
    paths: ['readme.source.md']
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Profile Assets
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
        run: |
          node .github/scripts/generate-assets.js

      - name: Build README Aura
        run: |
          npx readme-aura@latest build

      - name: Deploy to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: regenerate profile with high-performance assets" || exit 0
          git push origin main
